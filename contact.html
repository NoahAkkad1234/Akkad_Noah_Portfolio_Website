<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Page</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Merriweather&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/contact.css" />
</head>

<body>
  <!-- Header -->
  <header id="headertop">
    <div class="logo">
      <img src="img/logo.png" alt="Logo" class="sitelogo">
    </div>

    <nav>
      <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" >Contact</a></li>
    </nav>
  </header>

  <!--oval-->
 <section class="oval">
    <h1>Questions?</h1>
    <h2>Contact us.</h2>
 </section>
  <!-- Contact Form -->
    <main class="contact-section">
      <form name="myForm" action="#" onsubmit="validateForm()" method="post">
            <div class="row">
              <input type="text" id="firstname" placeholder="First Name">
                 <span id="firstname-error" class="error"></span>
              <input type="text" id="lastname" placeholder="last Name">
                <span id="lastname-error" class="error"></span>
            </div>
            <div class="rowtow">
              <input type="email" id="email" placeholder="Email">
              <span id="email-error" class="error"></span>
            </div>
            <div class="rowthree">
              <textarea name="message" id="message" placeholder="message"></textarea>
        <span id="message-error" class="error"></span>
            </div>
               <button type="submit" class="submit">SUBMIT</button > 
             </div>
          </form>
      
          <!-- Confirmation Popup -->
                <div id="popup" class="popup">
            <div class="popup-content">
          <span id="closePopup" class="close"></span>
          <h2>Form Submitted!</h2>
    <p>Thank you for contacting us.We will get back to you soon.</p>
  </div>
</div>
 <audio id="myAudio"> <source src="./audio/check.mp3"></audio>
     </main>

  <!-- Footer -->
  <footer>
          <div class="socials">
				<ul>
					<li><a href="https://www.facebook.com/"><span class="text">Facebook</span></a></li>
					<li><a href="https://x.com/"><span class="text">X</span></a></li>
					<li><a href="https://instagram.com"><span class="text">Instagram</span></a></li>
				</ul>
			</div>
    <p>© 2026 Noah Akkad</p>
  </footer>
          <script src="./js/contact.js"></script>
</body>
</html>
